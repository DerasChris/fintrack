name: fintrack_sv
description: Gestor financiero personal con lectura de SMS bancarios salvadoreños.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Lectura de SMS nativos Android
  flutter_sms_inbox: ^1.0.5
  permission_handler: ^11.3.1

  # Base de datos local SQLite
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Gestión de estado
  provider: ^6.1.2

  # Gráficas
  fl_chart: ^0.68.0

  # Exportar PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  # Utilidades
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  http: ^1.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
